name: Build and Release

on:
    push:
        branches:
            - main # Trigger on every push to main

permissions:
    contents: write # Critical: Allows the action to create/update releases

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.21"

            - name: Build Go Binary
              # We name it specifically so the "Permanent Link" stays consistent
              run: go build -v -o spawn-executor main.go

            - name: Update Latest Release
              uses: pipe-cd/actions-gh-release@v2
              with:
                  # Use a fixed tag name like 'latest' so the link never changes
                  tag_name: latest
                  name: "Latest Build"
                  body: "Automated build from the latest push to main."
                  draft: false
                  prerelease: false
                  files: spawn-executor
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
