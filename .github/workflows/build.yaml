name: Build and Release

on:
    push:
        branches:
            - main # This ensures it runs whenever you push code

permissions:
    contents: write # This is the "Key" that lets the token work

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.25"

            - name: Build
              # We name the file exactly 'spawn-executor' for the permanent link
              run: go build -v -o spawn-executor main.go

            - name: Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest # This keeps the URL permanent
                  files: spawn-executor
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
